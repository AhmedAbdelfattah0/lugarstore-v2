<section
  class="promo"
  aria-label="Editorial banner"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <div class="promo__grid">

    <!-- Left: editorial text panel -->
    <div class="promo__text">
      <p class="promo__eyebrow">{{ activeSlide().eyebrow }}</p>
      <h2 class="promo__heading">{{ activeSlide().heading }}</h2>
      <p class="promo__subtext">{{ activeSlide().subtext }}</p>
      <p class="promo__description">{{ activeSlide().description }}</p>

      <div class="promo__actions">
        <lg-button variant="outlined" size="lg">
          <a [routerLink]="activeSlide().ctaRoute" class="promo__cta-link">
            {{ activeSlide().cta }}
          </a>
        </lg-button>
      </div>

      <!-- Nav arrows + dots -->
      <div class="promo__bottom">
        <div class="promo__nav" role="group" aria-label="Slide navigation">
          <button type="button" class="promo__arrow" (click)="prev()" aria-label="Previous slide">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M12 4L6 10l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" class="promo__arrow" (click)="next()" aria-label="Next slide">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M8 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="promo__dots" role="tablist" aria-label="Slides">
          @for (i of dotsArray(); track i) {
            <button
              type="button"
              role="tab"
              class="promo__dot"
              [class.promo__dot--active]="i === activeIndex()"
              (click)="goTo(i)"
              [attr.aria-label]="'Go to slide ' + (i + 1)"
              [attr.aria-selected]="i === activeIndex()"
            ></button>
          }
        </div>
      </div>
    </div>

    <!-- Right: full-bleed image — only renders when URL is available -->
    <div class="promo__image-panel">
      @if (activeSlide().imageUrl) {
        <img
          class="promo__image"
          [src]="activeSlide().imageUrl"
          [alt]="activeSlide().heading"
          loading="lazy"
        />
      }
    </div>

  </div>
</section>
