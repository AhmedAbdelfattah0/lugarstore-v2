@if (visible()) {
  <div class="offer-banner">
    <div class="offer-banner__inner">
      <span class="offer-banner__label">The Artisan's Archive</span>
      <span class="offer-banner__divider">·</span>
      <span class="offer-banner__text">Up to 40% Off — Limited Inventory</span>
      <span class="offer-banner__divider">·</span>
      <div class="offer-banner__countdown" aria-label="Countdown timer">
        <span class="offer-banner__unit">
          <strong>{{ pad(timeLeft().hours) }}</strong>
          <em>hrs</em>
        </span>
        <span class="offer-banner__colon">:</span>
        <span class="offer-banner__unit">
          <strong>{{ pad(timeLeft().minutes) }}</strong>
          <em>min</em>
        </span>
        <span class="offer-banner__colon">:</span>
        <span class="offer-banner__unit">
          <strong>{{ pad(timeLeft().seconds) }}</strong>
          <em>sec</em>
        </span>
      </div>
    </div>

    <button
      type="button"
      class="offer-banner__close"
      aria-label="Dismiss offer"
      (click)="dismiss()"
    >
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
}
