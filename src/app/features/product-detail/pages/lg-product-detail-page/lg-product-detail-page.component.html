<lg-navbar />

<main class="pdp">

  <!-- ── Loading ─────────────────────────────────────────────────────── -->
  @if (pdpState.isLoading()) {
    <div class="pdp__loader">
      <lg-spinner />
    </div>
  }

  <!-- ── Error ───────────────────────────────────────────────────────── -->
  @else if (pdpState.error()) {
    <div class="pdp__loader">
      <lg-empty-state
        icon="!"
        title="Product not found"
        [message]="pdpState.error()!"
        ctaLabel="Back to Collections"
        (ctaClick)="router.navigate(['/products'])"
      />
    </div>
  }

  <!-- ── Product content ─────────────────────────────────────────────── -->
  @else if (pdpState.product(); as product) {

    <!-- ABOVE FOLD: split layout ─────────────────────────────────────── -->
    <div class="pdp__split">

      <!-- LEFT: Image gallery -->
      <div class="pdp__gallery">
        <lg-image-gallery
          [images]="product.images"
          [selectedIndex]="pdpState.selectedImageIdx()"
          (selectImage)="pdpState.selectImage($event)"
        />
      </div>

      <!-- RIGHT: Info panel -->
      <div class="pdp__panel">
        <lg-breadcrumb [items]="pdpState.breadcrumbs()" separator="/" />
        <lg-product-info
          [product]="product"
          [qty]="pdpState.qty()"
          [isWishlisted]="isWishlisted(product.id)"
          (qtyChange)="pdpState.setQty($event)"
          (addToCart)="onAddToCart()"
          (wishlistToggle)="onWishlistToggle()"
          (whatsappEnquire)="onWhatsappEnquire()"
          (commissionCustom)="onCommissionCustom()"
        />
      </div>

    </div>

    <!-- BELOW FOLD: scrollytelling + related -->
    <lg-scrollytelling
      [relatedProducts]="pdpState.relatedProducts()"
      [categoryId]="product.categoryId"
      (addRelatedToCart)="onRelatedAddToCart($event)"
      (addRelatedToWishlist)="onRelatedAddToWishlist($event)"
    />

  }

</main>

<lg-footer />
