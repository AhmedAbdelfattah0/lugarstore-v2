<div class="gallery">

  <!-- Main image -->
  <div class="gallery__main">
    <img
      [src]="images()[selectedIndex()]"
      [alt]="'Product image ' + (selectedIndex() + 1)"
      loading="eager"
      class="gallery__main-img"
    />
    <!-- Zoom button — presentational, zoom lightbox out of scope -->
    <button class="gallery__zoom" type="button" aria-label="Zoom image">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
        <path d="M11 8v6M8 11h6"/>
      </svg>
    </button>
  </div>

  <!-- Thumbnail strip — only shown when more than 1 image -->
  @if (images().length > 1) {
    <div class="gallery__thumbs">
      @for (img of images() | slice:0:4; track $index) {
        <button
          class="gallery__thumb"
          [class.gallery__thumb--active]="selectedIndex() === $index"
          (click)="selectImage.emit($index)"
          type="button"
          [attr.aria-label]="'View image ' + ($index + 1)"
        >
          <img [src]="img" alt="" loading="lazy" />
        </button>
      }
    </div>
  }

</div>
