<lg-navbar />

@if (items().length > 0) {

  <main class="cart-page">
    <div class="cart-layout">

      <!-- Left: items panel -->
      <div class="cart-left">
        <h1 class="cart-heading">Your Shopping Bag</h1>

        <!-- Column headers (desktop only) -->
        <div class="cart-headers" aria-hidden="true">
          <span class="cart-headers__product">Product</span>
          <span class="cart-headers__price">Price</span>
          <span class="cart-headers__qty">Quantity</span>
          <span class="cart-headers__subtotal">Subtotal</span>
        </div>

        <!-- Item rows -->
        @for (item of items(); track item.id) {
          <div class="cart-item">

            <!-- Product col: thumb + info -->
            <div class="cart-item__product">
              <img
                class="cart-item__thumb"
                [src]="item.image"
                [alt]="item.title"
                width="88"
                height="88"
              />
              <div class="cart-item__info">
                <p class="cart-item__name">{{ item.title }}</p>
                @if (item.categoryName) {
                  <p class="cart-item__category">{{ item.categoryName }}</p>
                }
              </div>
            </div>

            <!-- Price -->
            <span class="cart-item__price">{{ item.price | lgCurrencyEgp }}</span>

            <!-- Quantity stepper -->
            <div class="cart-item__qty">
              <lg-quantity-stepper
                [value]="item.qty"
                (valueChange)="onQtyChange(item.id, $event)"
              />
            </div>

            <!-- Subtotal + remove -->
            <div class="cart-item__subtotal-cell">
              <span class="cart-item__subtotal">{{ item.price * item.qty | lgCurrencyEgp }}</span>
              <button
                class="cart-item__remove"
                type="button"
                (click)="onRemove(item.id)"
                [attr.aria-label]="'Remove ' + item.title"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/>
                  <path d="M14 11v6"/>
                  <path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>

          </div>
        }

        <!-- Continue shopping -->
        <button class="cart-continue" type="button" (click)="onContinueShopping()">
          ← Continue Shopping
        </button>
      </div>

      <!-- Right: order summary -->
      <div class="cart-right">
        <lg-order-summary
          [items]="items()"
          ctaLabel="Proceed to Checkout"
          (ctaClick)="onCheckout()"
        />
      </div>

    </div>
  </main>

  <!-- Mobile sticky checkout bar -->
  <div class="cart-mobile-bar">
    <button class="cart-mobile-bar__btn" type="button" (click)="onCheckout()">
      Proceed to Checkout
    </button>
  </div>

} @else {

  <main class="cart-empty">
    <lg-empty-state
      icon="shopping-bag"
      title="Your bag is empty"
      message="Every masterpiece begins with a single selection. Start curating your space with our latest collections."
      ctaLabel="Explore Collections"
      (ctaClick)="onContinueShopping()"
    />
  </main>

}

<lg-footer />
