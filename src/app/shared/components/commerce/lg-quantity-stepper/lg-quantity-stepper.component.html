<div class="stepper">
  <button
    type="button"
    class="stepper__btn"
    (click)="decrement()"
    [disabled]="atMin()"
    aria-label="Decrease quantity"
  >−</button>

  <span class="stepper__value">{{ value() }}</span>

  <button
    type="button"
    class="stepper__btn"
    (click)="increment()"
    [disabled]="atMax()"
    aria-label="Increase quantity"
  >+</button>
</div>
