<div class="trust-grid" aria-label="Why choose Lugar">
  @for (item of items; track item.heading; let last = $last) {
    <div class="trust-item" [class.trust-item--last]="last">
      <p class="trust-eyebrow">{{ item.eyebrow }}</p>
      <h4 class="trust-title">{{ item.heading }}</h4>
      <p class="trust-desc">{{ item.description }}</p>
    </div>
  }
</div>
