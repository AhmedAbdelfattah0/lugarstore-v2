<nav class="breadcrumb" aria-label="Breadcrumb">
  @for (link of links(); track link.label) {
    @if (link.route) {
      <a [routerLink]="link.route" class="breadcrumb__link">{{ link.label }}</a>
    } @else {
      <span class="breadcrumb__link">{{ link.label }}</span>
    }
    <span class="breadcrumb__sep" aria-hidden="true">{{ separator() }}</span>
  }

  @if (current(); as curr) {
    <span class="breadcrumb__current" aria-current="page">{{ curr.label }}</span>
  }
</nav>
