<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner">

    <!-- Left: nav links (desktop only) -->
    <nav class="navbar__nav" aria-label="Main navigation">
      @for (link of navLinks; track link.route) {
        <a [routerLink]="link.route" class="navbar__link">{{ link.label }}</a>
      }
    </nav>

    <!-- Center: logo -->
    <a routerLink="/" class="navbar__logo" aria-label="Lugar Furniture — Home">
      LUGAR FURNITURE
    </a>

    <!-- Right: icons -->
    <div class="navbar__actions">

      <!-- Search (desktop) -->
      <button class="navbar__icon-btn navbar__icon-btn--desktop" type="button" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <!-- Wishlist -->
      <a routerLink="/wishlist" class="navbar__icon-btn" aria-label="Wishlist">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        @if (wishlist.count() > 0) {
          <span class="navbar__badge">{{ wishlist.count() }}</span>
        }
      </a>

      <!-- Cart -->
      <a routerLink="/cart" class="navbar__icon-btn" aria-label="Shopping bag">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        @if (cart.count() > 0) {
          <span class="navbar__badge">{{ cart.count() }}</span>
        }
      </a>

      <!-- Hamburger (mobile only) -->
      <button
        class="navbar__icon-btn navbar__icon-btn--mobile"
        type="button"
        (click)="drawer.toggle()"
        aria-label="Open menu"
        [attr.aria-expanded]="drawer.isOpen()"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

  </div>
</header>
