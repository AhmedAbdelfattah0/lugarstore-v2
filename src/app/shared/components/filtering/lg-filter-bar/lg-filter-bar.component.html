<div class="filter-bar">
  <div class="filter-bar__inner">

    <!-- Category pills -->
    <div class="filter-bar__pills">
      <button
        class="filter-bar__pill"
        [class.filter-bar__pill--active]="activeCategory() === null"
        (click)="selectCategory(null)"
        type="button"
      >All</button>

      @for (cat of categories(); track cat.id) {
        <button
          class="filter-bar__pill"
          [class.filter-bar__pill--active]="activeCategory() === cat.id"
          (click)="selectCategory(cat.id)"
          type="button"
        >{{ cat.title }}</button>
      }
    </div>

    <!-- Count + Sort -->
    <div class="filter-bar__right">
      <span class="filter-bar__count">
        {{ productCount() }} {{ productCount() === 1 ? 'Object' : 'Objects' }}
      </span>

      <div class="filter-bar__sort-wrap">
        <span class="filter-bar__sort-label">Sort By</span>
        <div class="filter-bar__sort-select-wrap">
          <select
            class="filter-bar__sort-select"
            [value]="sortValue()"
            (change)="onSortChange($event)"
            aria-label="Sort products"
          >
            @for (opt of sortOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
          <svg class="filter-bar__chevron" width="7" height="4" viewBox="0 0 7 4" fill="none" aria-hidden="true">
            <path d="M1 1L3.5 3.5L6 1" stroke="#1c1917" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

  </div>
</div>
