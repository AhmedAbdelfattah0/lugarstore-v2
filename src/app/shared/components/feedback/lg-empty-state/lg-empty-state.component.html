<div class="empty-state">
  @if (icon()) {
    <div class="icon">{{ icon() }}</div>
  }
  <h3 class="title">{{ title() }}</h3>
  @if (message()) {
    <p class="message">{{ message() }}</p>
  }
  @if (ctaLabel()) {
    <lg-button variant="outlined" (click)="ctaClick.emit()">{{ ctaLabel() }}</lg-button>
  }
</div>
